<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-card-hover: #202020;
    --bg-input: #222;
    --border: rgba(255,255,255,0.08);
    --border-em: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text-secondary: #888;
    --text-tertiary: #555;
    --accent: #a0c4ff;
    --success: #6fcf97;
    --danger: #eb5757;
    --warning: #f2c94c;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  .dash { max-width: 860px; margin: 0 auto; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin: 2rem 0 0.6rem;
  }

  .card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }

  /* weather */
  .w-temp { font-size: 38px; font-weight: 500; line-height: 1; }
  .w-desc { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
  .w-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .w-side { text-align: right; font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

  /* numerology */
  .num-label {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .num-big {
    font-size: 34px;
    font-weight: 500;
    line-height: 1;
    color: var(--text);
  }
  .num-big .reduced { font-size: 20px; color: var(--text-secondary); }
  .num-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }

  .day-badge {
    display: inline-block;
    font-size: 11px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    color: var(--text-secondary);
    margin-top: 10px;
  }

  /* projects */
  .proj-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .proj-note { font-size: 14px; color: var(--text); line-height: 1.6; min-height: 44px; }
  .proj-note .empty { color: var(--text-tertiary); font-size: 13px; }
  .proj-ta {
    width: 100%;
    font-size: 14px;
    color: var(--text);
    background: var(--bg-input);
    border: 0.5px solid var(--border-em);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    resize: none;
    font-family: inherit;
    line-height: 1.6;
    min-height: 70px;
    display: none;
    outline: none;
  }
  .proj-ta:focus { border-color: var(--accent); }
  .edit-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 10px;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .edit-btn:hover { background: var(--bg-card-hover); color: var(--text-secondary); }
  .save-btn {
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: 0.5px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 3px 10px;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
  }

  /* money */
  .money-label {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .money-input {
    font-size: 30px;
    font-weight: 500;
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    outline: none;
    padding: 0;
  }
  .money-input::-webkit-inner-spin-button,
  .money-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .money-big { font-size: 30px; font-weight: 500; }
  .money-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  @media (max-width: 600px) {
    .grid-3 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-2 { grid-template-columns: 1fr; }
    .num-big { font-size: 28px; }
  }
  @media (max-width: 400px) {
    .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="dash">

  <div class="section-label">weather</div>
  <div class="card">
    <div id="w-loading" style="font-size:13px;color:#555;">Fetching weather...</div>
    <div id="w-content" style="display:none;display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="w-temp" id="w-temp"></div>
        <div class="w-desc" id="w-desc"></div>
        <div class="w-meta" id="w-meta"></div>
      </div>
      <div class="w-side">
        <div id="w-hilo"></div>
        <div id="w-wind"></div>
        <div id="w-humidity"></div>
      </div>
    </div>
  </div>

  <div class="section-label">numerology</div>
  <div class="grid-3" style="margin-bottom:10px;">
    <div class="card">
      <div class="num-label">universal year</div>
      <div class="num-big" id="u-year"></div>
      <div class="num-sub">2026</div>
    </div>
    <div class="card">
      <div class="num-label">universal month</div>
      <div class="num-big" id="u-month"></div>
      <div class="num-sub" id="u-month-sub"></div>
    </div>
    <div class="card">
      <div class="num-label">universal day</div>
      <div class="num-big" id="u-day"></div>
      <div class="num-sub" id="u-day-sub"></div>
    </div>
  </div>
  <div class="grid-3">
    <div class="card">
      <div class="num-label">personal year</div>
      <div class="num-big" id="p-year"></div>
      <div class="num-sub">birthday 9/7</div>
    </div>
    <div class="card">
      <div class="num-label">personal month</div>
      <div class="num-big" id="p-month"></div>
      <div class="num-sub">p.year + current month</div>
    </div>
    <div class="card">
      <div class="num-label">personal day</div>
      <div class="num-big" id="p-day"></div>
      <div class="num-sub" id="p-day-sub"></div>
    </div>
  </div>
  <span class="day-badge" id="day-of-year"></span>

  <div class="section-label">projects</div>
  <div class="grid-2" id="projects-grid"></div>

  <div class="section-label">money</div>
  <div class="grid-2">
    <div class="card" style="border-color:rgba(255,255,255,0.15);">
      <div class="money-label">money i owe</div>
      <input class="money-input" type="number" id="money-owe" value="" placeholder="0.00" step="0.01" />
      <div class="money-sub">bills this month</div>
    </div>
    <div class="card">
      <div class="money-label">left over</div>
      <div class="money-big" id="left-over">—</div>
      <div class="money-sub">after bills paid</div>
    </div>
  </div>

</div>

<script>
const BDAY_M = 9, BDAY_D = 7;

function digitSplit(n) { return String(Math.abs(n)).split('').map(Number); }
function sumDigits(n) { return digitSplit(n).reduce((a,b)=>a+b,0); }
function fullReduce(n) {
  const original = n;
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) { n = sumDigits(n); }
  return { full: original, reduced: n };
}
function fmt(el, full, reduced) {
  el.innerHTML = full === reduced
    ? String(full)
    : full + '<span class="reduced">/' + reduced + '</span>';
}
function getDayOfYear(d) {
  return Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
}

function calcNumerology() {
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth()+1, dy = now.getDate();

  const uYearRaw = digitSplit(yr).reduce((a,b)=>a+b,0);
  const uYear = fullReduce(uYearRaw);
  fmt(document.getElementById('u-year'), uYear.full, uYear.reduced);

  const uMonthRaw = uYearRaw + mo;
  const uMonth = fullReduce(uMonthRaw);
  fmt(document.getElementById('u-month'), uMonth.full, uMonth.reduced);
  document.getElementById('u-month-sub').textContent =
    ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][mo-1] + ' ' + yr;

  const uDayRaw = sumDigits(mo) + sumDigits(dy) + sumDigits(yr);
  const uDay = fullReduce(uDayRaw);
  fmt(document.getElementById('u-day'), uDay.full, uDay.reduced);
  document.getElementById('u-day-sub').textContent = mo+'/'+dy+'/'+yr;

  const lastBdayYr = (mo > BDAY_M || (mo === BDAY_M && dy >= BDAY_D)) ? yr : yr-1;
  const pYearRaw = BDAY_M + BDAY_D + digitSplit(lastBdayYr).reduce((a,b)=>a+b,0);
  const pYear = fullReduce(pYearRaw);
  fmt(document.getElementById('p-year'), pYear.full, pYear.reduced);

  const pMonthRaw = pYear.full + mo;
  const pMonth = fullReduce(pMonthRaw);
  fmt(document.getElementById('p-month'), pMonth.full, pMonth.reduced);

  const doy = getDayOfYear(now);
  const pDayRaw = pMonth.full + doy;
  const pDay = fullReduce(pDayRaw);
  fmt(document.getElementById('p-day'), pDay.full, pDay.reduced);
  document.getElementById('p-day-sub').textContent = 'p.month + day ' + doy;

  const isLeap = (yr%4===0 && yr%100!==0) || yr%400===0;
  document.getElementById('day-of-year').textContent = 'Day ' + doy + ' of ' + (isLeap ? 366 : 365);
}

const PROJECTS = [
  { id: 'da', title: 'DA' },
  { id: 'trading', title: 'Trading' },
  { id: 'fitness-app', title: 'Fitness app' },
  { id: 'fitness-protocol', title: 'Current fitness protocol' }
];

function loadProjects() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  PROJECTS.forEach(p => {
    const saved = localStorage.getItem('proj_' + p.id) || '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="proj-title">${p.title}</div>
      <div class="proj-note" id="disp-${p.id}">${saved ? saved.replace(/\n/g,'<br>') : '<span class="empty">No notes yet</span>'}</div>
      <textarea class="proj-ta" id="edit-${p.id}">${saved}</textarea>
      <button class="edit-btn" id="btn-${p.id}">edit</button>
    `;
    grid.appendChild(card);
    document.getElementById('btn-'+p.id).addEventListener('click', () => {
      const isEditing = document.getElementById('edit-'+p.id).style.display === 'block';
      isEditing ? saveNote(p.id) : toggleEdit(p.id);
    });
  });
}

function toggleEdit(id) {
  document.getElementById('disp-'+id).style.display = 'none';
  document.getElementById('edit-'+id).style.display = 'block';
  document.getElementById('edit-'+id).focus();
  const btn = document.getElementById('btn-'+id);
  btn.textContent = 'save';
  btn.className = 'save-btn';
}

function saveNote(id) {
  const val = document.getElementById('edit-'+id).value.trim();
  localStorage.setItem('proj_'+id, val);
  const disp = document.getElementById('disp-'+id);
  disp.innerHTML = val ? val.replace(/\n/g,'<br>') : '<span class="empty">No notes yet</span>';
  disp.style.display = 'block';
  document.getElementById('edit-'+id).style.display = 'none';
  const btn = document.getElementById('btn-'+id);
  btn.textContent = 'edit';
  btn.className = 'edit-btn';
}

function calcMoney() {
  const owe = parseFloat(document.getElementById('money-owe').value);
  const el = document.getElementById('left-over');
  if (isNaN(owe)) { el.textContent = '—'; el.style.color = ''; return; }
  el.textContent = '-$' + owe.toFixed(2);
  el.style.color = owe > 0 ? '#eb5757' : '#6fcf97';
}

async function fetchWeather() {
  if (!navigator.geolocation) {
    document.getElementById('w-loading').textContent = 'Location unavailable';
    return;
  }
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m` +
        `&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=1`
      );
      const data = await res.json();
      const c = data.current, dl = data.daily;
      const descs = {
        0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
        45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
        61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
        80:'Showers',81:'Heavy showers',95:'Thunderstorm'
      };
      document.getElementById('w-temp').textContent = Math.round(c.temperature_2m) + '°F';
      document.getElementById('w-desc').textContent = descs[c.weather_code] || 'Conditions unknown';
      document.getElementById('w-meta').textContent = 'Feels like ' + Math.round(c.apparent_temperature) + '°F';
      document.getElementById('w-hilo').textContent = 'H:' + Math.round(dl.temperature_2m_max[0]) + '°  L:' + Math.round(dl.temperature_2m_min[0]) + '°';
      document.getElementById('w-wind').textContent = 'Wind ' + Math.round(c.wind_speed_10m) + ' mph';
      document.getElementById('w-humidity').textContent = 'Humidity ' + c.relative_humidity_2m + '%';
      document.getElementById('w-loading').style.display = 'none';
      const wc = document.getElementById('w-content');
      wc.style.display = 'flex';
    } catch(e) {
      document.getElementById('w-loading').textContent = 'Could not load weather';
    }
  }, () => {
    document.getElementById('w-loading').textContent = 'Allow location access to see weather';
  });
}

calcNumerology();
loadProjects();
fetchWeather();
document.getElementById('money-owe').addEventListener('input', calcMoney);
</script>
</body>
</html>
